name: sistema_rgt
description: Aplicativo RGT para demonstrativo mensal de entradas e saídas financeiras de colaboradores.
publish_to: "none"
version: 0.9.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3
  file_selector: ^1.0.3
  http: ^1.6.0
  package_info_plus: ^10.1.0
  supabase_flutter: ^2.15.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logo-banca.png
    - assets/brand/logo-banca.svg
